# Avis personnel (note explicitement citée dans la source : 7/10)
# -----------------------------------------------------------------------------
avis:
  note: 7
  intensite: MODÉRÉ   # FORT / MODÉRÉ / FAIBLE
  texte: |
    Plateforme exclusive Pasteur = moat structurel. Sanofi 20 M€ pour
    ~11 % de la capitalisation = validation Big Pharma significative.
    SENS-601 (GJB2) ouvre un marché 30-40× plus large que celui d'OTOF.
    Cours en zone basse, catalyseur imminent (CTA).

    L'élément le plus structurant reste l'accord-cadre exclusif avec
    l'Institut Pasteur / Institut de l'Audition prolongé jusqu'en 2028.
    Sensorion s'est assuré que toutes les découvertes du Pr Christine
    Petit en thérapie génique auditive lui reviennent en licence
    exclusive — barrière à l'entrée que les concurrents (Regeneron,
    Lilly) ne peuvent pas reproduire. SENS-501 et SENS-601 sont les
    deux premiers produits de cette plateforme, un troisième programme
    avant 2028 est probable.

    Position à dimensionner avec prudence : risque binaire clinique,
    n faibles, levée nécessaire post-S1 2027, concurrence Big Pharma.
    Ne constitue ni conseil en investissement ni recommandation.

