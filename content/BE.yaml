# -----------------------------------------------------------------------------
# Alertes & points clés
# Catégories autorisées : MOAT / CATALYSEUR / RISQUE / FINANCE / PIPELINE
# -----------------------------------------------------------------------------
alertes:

  - categorie: MOAT
    titre: Technologie SOFC haute température — différenciation vs PEM/MCFC
    description: |
      Bloom Energy fabrique des Solid Oxide Fuel Cells (SOFC) haute
      température, déployables on-site en 6-9 mois pour fournir de
      l'électricité 24/7 (gaz naturel, biogaz ou hydrogène).

      Différenciation technique vs concurrents : Plug Power et Ballard
      Power exploitent le PEM (proton-exchange membrane), FuelCell
      Energy le carbonate fondu (MCFC). Bloom adresse spécifiquement
      le créneau du power on-site dense pour data centers et utilities,
      où la grille américaine peine à suivre la demande IA (vs 3-7 ans
      de raccordement réseau).

      Source : 10-K FY2025 (déposé 09/02/2026), communiqué Bloom Energy.

  - categorie: CATALYSEUR
    titre: Deal Oracle 2,8 GW + Project Jupiter 2,45 GW (avril 2026)
    description: |
      Le 14 avril 2026, Oracle et Bloom Energy ont étendu leur master
      services agreement à 2,8 GW au total (1,2 GW déjà sous contrat,
      déploiement en cours). Le 27 avril 2026, Oracle, BorderPlex
      Digital Assets et Bloom Energy ont annoncé le « Project Jupiter »
      (Doña Ana County, New Mexico) : jusqu'à 2,45 GW de capacité fuel
      cell installée pour data center IA.

      Oracle a parallèlement reçu un warrant 400 M$ sur le stock BE
      (CNBC 13/04/2026). Le titre BE a progressé de +22 % sur l'annonce
      Oracle.

      Sources : Bloom Energy IR (14/04/2026), Oracle Newsroom
      (27/04/2026), Bloomberg (13/04/2026), CNBC (14/04/2026).

  - categorie: CATALYSEUR
    titre: Deal AEP — 2,65 Md$ pour 1 GW de SOFC (janvier 2026)
    description: |
      Accord-cadre initial novembre 2024, finalisé en janvier 2026 à
      2,65 Md$ pour 1 GW de SOFC fournis à American Electric Power
      (AEP). Première commande ferme : 100 MW (2024). En juin 2025,
      la PUCO (Public Utility Commission Ohio) a approuvé un dispositif
      AEP Ohio servant Amazon Web Services et Cologix (72,9 MW
      initiaux), AWS finançant directement la capacité behind-the-meter.

      Sources : Bloom Energy IR, AEP Newsroom, Utility Dive,
      bestofai.com.

  - categorie: FINANCE
    titre: Q1 2026 record + guidance FY2026 relevée à 3,4-3,8 Md$
    description: |
      Le 28 avril 2026, Bloom Energy a publié son Q1 2026 :
      revenus 751,1 M$ (+130,4 % YoY, beat consensus +41,6 %), EPS
      0,44 $ (vs consensus 0,13 $, beat +238 %), marge opérationnelle
      non-GAAP 17,3 % (+1330 pb YoY).

      La guidance FY2026 a été relevée à 3,4-3,8 Md$ (mid 3,6 Md$,
      soit ~+80 % YoY vs FY2025 à 2,02 Md$). Marge brute non-GAAP
      cible ~32 %, résultat opérationnel non-GAAP cible 425-475 M$.

      Backlog au 31/12/2025 : ~6 Md$ produit (+140 % YoY) et ~14 Md$
      service.

      Sources : Bloom Energy IR (28/04/2026), earnings call Q1 2026
      (Motley Fool transcript).

  - categorie: RISQUE
    titre: Valorisation extrême — ~80 Md$ de capitalisation, +134 % YTD
    description: |
      Cours 283,36 $ au 01/05/2026, capitalisation ~80,6 Md$, range
      52 semaines 16,05 $ – 296,50 $ (multiplication par >17 sur 1 an).
      Variation YTD 2026 : ~+134 %.

      Le ratio implicite capitalisation / mid guidance FY2026 (3,6 Md$)
      ressort à ~22x revenus, niveau historiquement élevé pour une
      industrielle. Toute déception sur la cadence d'exécution Oracle/
      AEP, ou tout repli du narratif IA / data centers, exposerait le
      titre à une correction rapide.

      Sources : Yahoo Finance (01/05/2026), StockAnalysis.com.

  - categorie: RISQUE
    titre: Concentration client + dilution Oracle (warrant 400 M$)
    description: |
      Oracle, AEP et Brookfield concentrent une part majeure du backlog
      (~7,65 Md$ d'engagements data center entre octobre 2025 et
      janvier 2026). Le warrant 400 M$ accordé à Oracle représente un
      risque de dilution structurel à venir.

      Concurrence relancée : FuelCell Energy (FCEL) déclare >80 % de
      son pipeline en data centers au Q1 2026 et 450 MW d'opportunités
      identifiées avec SDCL ; Plug Power a clôturé un DOE loan
      guarantee de 1,66 Md$ qui écarte le risque de faillite immédiat.

      Sources : Bloom Energy IR, GlobeNewswire (FCEL Q1 2026, 09/03/2026),
      CoinCentral / Motley Fool (PLUG, avril 2026).

  - categorie: RISQUE
    titre: Crédit hydrogène 45V raboté — One Big Beautiful Bill Act
    description: |
      La « One Big Beautiful Bill Act », signée par Donald Trump le
      04/07/2025, met fin par anticipation au crédit fiscal 45V
      (hydrogène) : la construction des projets éligibles doit
      désormais avoir démarré avant le 31/12/2027. La branche SOEC
      (électrolyseurs) de Bloom est directement exposée.

      Le crédit ITC § 48E pour fuel cells (production électrique)
      reste en revanche préservé jusqu'à phase-out post-2032. Les
      restrictions « Foreign Entity of Concern » (FEoC) sur les
      matériaux durcissent : seuils 40 % en 2026, jusqu'à 60 % en 2030.

      Sources : Pierce Atwood (analyse 45V), McGuireWoods (analyse
      48E + FEoC), Canary Media.

