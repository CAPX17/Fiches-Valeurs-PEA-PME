# -----------------------------------------------------------------------------
# Synthèse IA (analyse augmentée — pas un avis humain)
# Score : indicateur synthétique 0-10 issu d'une lecture multi-critères
# -----------------------------------------------------------------------------
synthese_ia:
  score: 5
  force_signal: MODÉRÉ
  date_generation: 2026-05-01
  texte_synthese: |
    Bloom Energy a publié le 28 avril 2026 un Q1 2026 record :
    revenus 751,1 M$ (+130,4 % YoY), EPS 0,44 $ (vs consensus 0,13 $),
    marge opérationnelle non-GAAP 17,3 %. La guidance FY2026 a été
    relevée à 3,4-3,8 Md$ (mid 3,6 Md$, ~+80 % YoY). Le backlog au
    31/12/2025 atteint ~6 Md$ produit (+140 % YoY) et ~14 Md$ service.

    Le pipeline commercial est dominé par trois deals structurants :
    Oracle 2,8 GW (extension du master services agreement, 14/04/2026,
    avec warrant 400 M$) et Project Jupiter 2,45 GW (27/04/2026) ;
    AEP 2,65 Md$ pour 1 GW (janvier 2026), avec AWS et Cologix derrière
    via AEP Ohio approuvé par la PUCO en juin 2025 ; Brookfield
    « 5 Md$ on-site power partner » sur le portefeuille infrastructure.
    La cible de capacité production est de 2 GW/an d'ici fin 2026 (vs
    ~1 GW), avec une vision long terme de 5 GW/an.

    Le profil de risque est dominé par la valorisation : cours 283 $
    au 01/05/2026, capitalisation ~80,6 Md$, +134 % YTD, ratio implicite
    ~22x mid-guidance FY2026. La concentration client (Oracle / AEP /
    Brookfield) et la dilution potentielle du warrant Oracle 400 M$
    s'ajoutent. La « One Big Beautiful Bill Act » (04/07/2025) a raboté
    le crédit hydrogène 45V, exposant la branche SOEC, tandis que le
    crédit ITC § 48E pour fuel cells reste préservé jusqu'à 2032+.

    Le score 5/10 reflète l'asymétrie risk/reward : la trajectoire
    fondamentale (Q1 2026 +130 %, guidance up, deals Oracle/AEP/
    Brookfield documentés) est solide et déjà reconnue, mais le ratio
    capi/revenus ~22x FY2026E et le PER estimé ~161 limitent fortement
    le upside et exposent à une correction significative en cas de
    moindre déception. La force MODÉRÉ traduit la robustesse
    fondamentale, le score 5 l'attente d'un point d'entrée plus
    favorable.

  facteurs_positifs:
    - Q1 2026 record (revenus 751 M$, +130 %, EPS 0,44 $) + guidance FY2026 relevée à 3,4-3,8 Md$
    - Deal Oracle 2,8 GW + Project Jupiter 2,45 GW (avril 2026) — visibilité data center IA
    - Backlog produit ~6 Md$ (+140 % YoY) + service ~14 Md$ (visibilité multi-années)
    - Doublement capacité production à 2 GW/an d'ici fin 2026 (vs ~1 GW actuel)
    - Marge brute GAAP 29 % FY2025 (+1,6 pp YoY), trajectoire vers ~32 % non-GAAP

  facteurs_negatifs:
    - Capitalisation ~80,6 Md$ au 01/05/2026 — ratio implicite ~22x revenus FY2026E
    - Variation +134 % YTD 2026 — risque de correction sur tout repli du narratif IA
    - Concentration client (Oracle/AEP/Brookfield dominent le backlog)
    - Warrant Oracle 400 M$ — dilution potentielle structurelle
    - Crédit 45V raboté par la One Big Beautiful Bill Act (04/07/2025) — branche SOEC exposée

