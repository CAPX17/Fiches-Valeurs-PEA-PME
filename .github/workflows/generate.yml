name: Generate fiche

# Régénère docs/index.html à partir du YAML éditorial + données yfinance.
# Le commit auto inclut '[skip ci]' pour éviter une boucle de déclenchement.

on:
  workflow_dispatch:        # bouton "Run workflow" dans l'onglet Actions
  push:
    branches: [main]
    paths:
      - 'generate.py'
      - 'src/**'
      - 'templates/**'
      - 'static/**'
      - 'content/**'
      - 'requirements.txt'
      - '.github/workflows/generate.yml'
  schedule:
    # 4 runs par jour ouvré (lundi-vendredi), calibré heure d'été (UTC+2) :
    #   08:00 UTC → 10:00 Paris (1h après ouverture Euronext 9h)
    #   11:00 UTC → 13:00 Paris (mi-séance)
    #   14:00 UTC → 16:00 Paris (avant clôture 17:30)
    #   16:00 UTC → 18:00 Paris (~30min post-clôture, valeurs consolidées)
    # En heure d'hiver (UTC+1), les runs sont décalés à 9h/12h/15h/17h Paris.
    - cron: '0 8,11,14,16 * * 1-5'

permissions:
  contents: write

concurrency:
  group: generate-fiche
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # checkout v5 = runner Node 24 (sortie août 2025).
        # actions/upload-artifact non utilisée ici ; à passer en v5
        # si introduite plus tard. Revue prévue : 2026-10.
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (mandatory)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install yfinance pandas Jinja2 PyYAML
          pip install 'pandas-ta>=0.3' || echo "pandas-ta non disponible, fallback pandas pur utilisé"

      - name: Generate fiche
        run: python generate.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain docs/)" ]]; then
            git add docs/
            git commit -m "chore(auto): regen docs/ from yfinance [skip ci]"
            git push origin HEAD:main
            echo "Commit auto poussé: $(git rev-parse HEAD)"
          else
            echo "Aucun changement dans docs/"
          fi
